name: Daily News Post Generator

on:
  # Run every day at 6:00 AM UTC (11:30 AM IST)
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  generate-posts:
    name: Fetch News & Generate Hinglish Posts
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news automation
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node src/main.js

      - name: Commit and push generated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/news.json output/posts.txt
          git diff --staged --quiet || git commit -m "chore: auto-update news and posts [skip ci]"
          git push
